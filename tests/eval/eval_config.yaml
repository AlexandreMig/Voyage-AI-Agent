metrics_to_run:
  - multi_turn_task_success
  - multi_turn_tool_use_quality
  - travel_feasibility_judge

custom_metrics:
  - name: travel_feasibility_judge
    prompt_template: |
      You are an expert travel auditor and QA judge evaluating a travel concierge agent's itinerary response against a user's prompt and preferences.
      
      Review the final travel plan in the Final Response and the tool invocations or intermediate steps in the Full Agent Trace.
      
      Evaluate the response and assign a score of 1 to 5 based on the following criteria:
      1 (Fails Criteria): The itinerary has massive scheduling overlaps (e.g. traveling between distant places instantly), ignores dietary constraints (e.g. recommends normal sushi for a vegan), or does not match weather conditions.
      2 (Deficient): The plan addresses the location but has at least one major flaw (e.g. recommends activities closed during that time, very congested schedule with no transit buffer, or misses dietary requirements in recommended restaurants).
      3 (Acceptable): The plan is realistic and covers key request elements, but is slightly basic, lacks weather-customized packing tips, or has very tight scheduling margins.
      4 (Very Good): The plan is highly realistic, honors dietary constraints perfectly, maps out correct activities, and matches the requested pace (e.g. relaxed vs. active limit).
      5 (Exceptional): The plan is flawless. It is geographically logical, provides perfect transit buffer suggestions, respects diet and pace constraints, incorporates season-specific weather advice, and has an exceptionally professional presentation.

      ### Target Evaluation Context:
      User Prompt: {prompt}
      Final Response: {response}
      Full Agent Trace: {agent_data}

      Return your audit as a valid JSON object matching this structure:
      {
        "score": <integer from 1 to 5>,
        "explanation": "<detailed audit rationale covering scheduling, diet, weather, and pace compatibility>"
      }
